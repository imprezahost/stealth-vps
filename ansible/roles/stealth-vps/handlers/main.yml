---
- name: Restart xray
  ansible.builtin.systemd:
    name: xray
    state: restarted
    daemon_reload: true

- name: Restart hysteria-server
  ansible.builtin.systemd:
    name: hysteria-server
    state: restarted
    daemon_reload: true

- name: Restart x-ui
  ansible.builtin.systemd:
    name: x-ui
    state: restarted
    daemon_reload: true

- name: Reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: false

# v0.6.0 — Telegram bot
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart stealth-vps-bot
  ansible.builtin.systemd:
    name: stealth-vps-bot.service
    state: restarted
    daemon_reload: true

# v0.6.0 — Caddy subscription endpoint
- name: restart caddy
  ansible.builtin.systemd:
    name: caddy.service
    state: restarted
    daemon_reload: true

- name: reload caddy
  ansible.builtin.systemd:
    name: caddy.service
    state: reloaded
