---
# Reality state generation — panel-INDEPENDENT.
#
# Generates the Reality crypto material (X25519 keypair, client UUID,
# shortId, port) and persists to /etc/stealth-vps/reality.state.yml.
# Idempotent: on subsequent runs we only load the existing state.
#
# This file does NOT touch the 3X-UI panel. It is the half of the old
# `xray.yml` that survives the move to v0.7.0 headless mode unchanged —
# the standalone-xray path will read the same `reality.state.yml`.
#
# The Reality state is created using the xray binary bundled inside
# the 3X-UI panel (for now). In v0.7.0 headless mode, the path resolves
# to `/usr/local/bin/xray` instead via a `stealth_vps_xray_bin` var.

- name: Ensure stealth-vps state directory exists
  # In panel mode panel.yml creates this dir before xray.yml runs; in
  # headless mode (v0.7+) panel.yml is skipped, so reality_state.yml has
  # to own its parent. Mode/owner mirror panel.yml's so a panel→headless
  # cutover doesn't churn perms on the existing dir.
  ansible.builtin.file:
    path: "{{ stealth_vps_panel_state_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0711'
  tags: [xray, reality]

- name: Probe xray binary used for crypto generation
  ansible.builtin.stat:
    path: "{{ stealth_vps_xray_keygen_bin | trim }}"
  register: stealth_vps_xray_bin_stat
  tags: [xray, reality]

- name: Assert xray binary present
  ansible.builtin.assert:
    that: stealth_vps_xray_bin_stat.stat.exists
    fail_msg: >-
      xray binary missing at {{ stealth_vps_xray_keygen_bin | trim }}.
      In panel mode the binary comes from the 3X-UI install — run
      `--tags panel` first. In headless mode (v0.7+, panel_enabled=false)
      the standalone binary is installed by `reality_xray_binary.yml`
      which runs first in xray.yml's wrapper.
  tags: [xray, reality]

# --- Reality state (generate once, reuse forever) ------------------------

- name: Probe existing reality state file
  ansible.builtin.stat:
    path: "{{ stealth_vps_panel_state_dir }}/reality.state.yml"
  register: stealth_vps_reality_state_stat
  tags: [xray, reality]

# `slurp` + `set_fact` rather than `include_vars`: include_vars reads
# from the Ansible CONTROLLER, which on Path B (ansible runs on the VPS)
# is the same machine as the remote — so it accidentally works. In
# molecule the controller is the runner container, NOT the test
# instance, so include_vars can't see /etc/stealth-vps/reality.state.yml
# even though we just wrote it on the target. slurp goes through the
# normal Ansible connection plugin, so it works on both.

- name: Read existing reality state from the remote
  ansible.builtin.slurp:
    src: "{{ stealth_vps_panel_state_dir }}/reality.state.yml"
  register: stealth_vps_reality_state_raw
  when: stealth_vps_reality_state_stat.stat.exists
  tags: [xray, reality]

- name: Set reality state fact from slurped YAML
  ansible.builtin.set_fact:
    stealth_vps_reality_state: "{{ stealth_vps_reality_state_raw.content | b64decode | from_yaml }}"
  when: stealth_vps_reality_state_stat.stat.exists
  tags: [xray, reality]

- name: Generate Reality state (first run only)
  when: not stealth_vps_reality_state_stat.stat.exists
  tags: [xray, reality]
  block:

    - name: Generate X25519 keypair via xray
      ansible.builtin.command:
        cmd: "{{ stealth_vps_xray_keygen_bin | trim }} x25519"
      register: stealth_vps_x25519_raw
      changed_when: false
      no_log: true

    - name: Debug x25519 output structure (key material redacted)
      # Sanity-check that the x25519 output matches the regex patterns
      # below. Each base64 value (43+ chars of [A-Za-z0-9_-]) is replaced
      # with `<REDACTED>` so we keep line prefixes ("PrivateKey:",
      # "Password:", "PublicKey:") visible in the log but never leak the
      # private key. Safe to keep in steady-state — first-run only.
      ansible.builtin.debug:
        msg: >-
          {{ stealth_vps_x25519_raw.stdout_lines
             | map('regex_replace', '[A-Za-z0-9_/+-]{20,}', '<REDACTED>')
             | list }}
        verbosity: 0

    - name: Generate client UUID via xray
      ansible.builtin.command:
        cmd: "{{ stealth_vps_xray_keygen_bin | trim }} uuid"
      register: stealth_vps_uuid_raw
      changed_when: false

    - name: Generate 8-char hex shortId
      ansible.builtin.command:
        cmd: openssl rand -hex 4
      register: stealth_vps_shortid_raw
      changed_when: false

    - name: Compose new reality state  # noqa: jinja[spacing]
      # Use a Jinja2 dict expression (rather than YAML mapping with
      # `"{{ ... }}"` values) so the port stays an int. YAML mappings
      # convert template outputs to strings, which then break the
      # 3X-UI POST that expects port:int. ansible-lint's jinja[spacing]
      # rule flags the multi-line form; disabled per-task.
      #
      # Regex patterns are defensive across Xray-core release history:
      #   v1.8.x:     `Private key: ...` / `Public key: ...`
      #   v1.8.x late: `PrivateKey: ...` / `Password(PublicKey): ...`
      #   v25.x:      `PrivateKey: ...` / `Password: ...` (also `PublicKey: ...`)
      # The non-greedy `Password[^:]*` swallows the legacy `(PublicKey)`
      # suffix; the alternation also matches the newer `PublicKey:` line.
      ansible.builtin.set_fact:
        stealth_vps_reality_state: "{{ {
          'port': (range(stealth_vps_reality_port_min, stealth_vps_reality_port_max + 1) | random),
          'private_key': (stealth_vps_x25519_raw.stdout
            | regex_search('(?:PrivateKey|Private key):\\s+(\\S+)', '\\1') | first),
          'public_key': (stealth_vps_x25519_raw.stdout
            | regex_search('(?:Password[^:]*|PublicKey|Public key):\\s+(\\S+)', '\\1') | first),
          'client_uuid': (stealth_vps_uuid_raw.stdout | trim),
          'client_email': stealth_vps_reality_default_client_email,
          'short_id': (stealth_vps_shortid_raw.stdout | trim),
        } }}"
      no_log: true

    - name: Persist reality state to disk
      ansible.builtin.copy:
        content: "{{ stealth_vps_reality_state | to_nice_yaml(indent=2, sort_keys=true) }}"
        dest: "{{ stealth_vps_panel_state_dir }}/reality.state.yml"
        owner: root
        group: root
        mode: '0600'
      no_log: true
