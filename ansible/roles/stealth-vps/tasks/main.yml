---
# stealth-vps role — main task entry.
#
# Each block is split into a focused task file so every step is auditable.
# Files that are not yet implemented are commented out; uncomment them as
# they land in the respective sprint.

- name: Assert supported distribution
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] in ['Debian', 'Ubuntu']
    fail_msg: "stealth-vps currently supports Debian 12+ and Ubuntu 22.04+ only."

- name: Apply kernel tuning (BBR, fq, TCP buffers)
  ansible.builtin.include_tasks: kernel.yml
  tags: [kernel, sysctl]

- name: Provision TLS cert (Let's Encrypt) when a domain is configured
  ansible.builtin.include_tasks: tls.yml
  tags: [tls, acme]

- name: Install and configure 3X-UI panel
  ansible.builtin.include_tasks: panel.yml
  when: stealth_vps_panel_enabled | bool
  tags: [panel, 3xui]

- name: Configure Reality inbound (VLESS-Reality via Xray)
  ansible.builtin.include_tasks: xray.yml
  when: stealth_vps_reality_enabled | bool
  tags: [xray, reality]

- name: Install and configure Hysteria2 server
  ansible.builtin.include_tasks: hysteria.yml
  when: stealth_vps_hysteria_enabled | bool
  tags: [hysteria, hysteria2]
