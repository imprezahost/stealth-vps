---
# stealth-vps role — main task entry.
#
# Each block is split into a focused task file so every step is auditable.
# Files that are not yet implemented are commented out; uncomment them as
# they land in the respective sprint.

- name: Assert supported distribution
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] in ['Debian', 'Ubuntu']
    fail_msg: "stealth-vps currently supports Debian 12+ and Ubuntu 22.04+ only."

# CPU architecture is resolved once up front so per-component tasks can
# reference `stealth_vps_arch` (amd64 / arm64) when building upstream
# binary URLs and bundled-binary paths. Adding a new arch only requires
# extending `stealth_vps_arch_map` in defaults — every consumer reads
# from this fact.
- name: Resolve target CPU architecture
  ansible.builtin.set_fact:
    stealth_vps_arch: "{{ stealth_vps_arch_map.get(ansible_facts.architecture, '__unsupported__') }}"

- name: Assert supported CPU architecture
  ansible.builtin.assert:
    that:
      - stealth_vps_arch != '__unsupported__'
    fail_msg: >-
      stealth-vps supports {{ stealth_vps_arch_map.values() | join(', ') }} only
      (architecture detected: {{ ansible_facts.architecture }}).
      Add a mapping under `stealth_vps_arch_map` in defaults/main.yml if you
      want to try an unvalidated architecture — Xray-core, Hysteria2, and 3X-UI
      all publish more variants than we currently smoke-test.

- name: Apply kernel tuning (BBR, fq, TCP buffers)
  ansible.builtin.include_tasks: kernel.yml
  tags: [kernel, sysctl]

- name: Provision TLS cert (Let's Encrypt) when a domain is configured
  ansible.builtin.include_tasks: tls.yml
  tags: [tls, acme]

- name: Install and configure 3X-UI panel
  ansible.builtin.include_tasks: panel.yml
  when: stealth_vps_panel_enabled | bool
  tags: [panel, 3xui]

- name: Configure Reality inbound (VLESS-Reality via Xray)
  ansible.builtin.include_tasks: xray.yml
  when: stealth_vps_reality_enabled | bool
  tags: [xray, reality]

- name: Install and configure Hysteria2 server
  ansible.builtin.include_tasks: hysteria.yml
  when: stealth_vps_hysteria_enabled | bool
  tags: [hysteria, hysteria2]

- name: Install Prometheus node_exporter (observability)
  ansible.builtin.include_tasks: observability.yml
  when: stealth_vps_observability_enabled | bool
  tags: [observability]

# --- v0.6.0: users index + Python pkg + bot + sub + CLI ----------------
# Ordering: users_index needs reality.state.yml + hysteria.state.yml on
# disk (created by xray.yml + hysteria.yml above). Python pkg seeds the
# bot and the metrics updater, so it goes before bot.yml. Subscription
# and bot are opt-in via defaults; CLI is on by default.

- name: Install shared Python package (used by metrics updater + bot + CLI)
  ansible.builtin.include_tasks: python_pkg.yml
  tags: [python_pkg, bot, cli]

- name: Seed users.index.json from the existing state files
  ansible.builtin.include_tasks: users_index.yml
  tags: [users, index]

# Headless-mode multi-client reload. In panel mode the 3X-UI panel API
# is the source of truth — overwriting Xray's config.json out from
# under it would crash the panel's reconciliation. ThreeXUIBackend
# pushes updates through the API instead, so this whole block is
# panel-mode-disabled at the `when:` gate.
#
# Also a no-op when BOTH reality and hysteria are off: the reloader
# would just exit 0, but skipping the include avoids an extra
# python-launch round-trip per converge in the molecule default
# scenario (which has every protocol disabled).
- name: Re-render multi-client configs from users.index.json (headless mode)
  ansible.builtin.include_tasks: headless_reload.yml
  when:
    - not (stealth_vps_panel_enabled | bool)
    - (stealth_vps_reality_enabled | bool) or (stealth_vps_hysteria_enabled | bool)
  tags: [users, index, headless]

- name: Install Telegram bot (opt-in)
  ansible.builtin.include_tasks: bot.yml
  when: stealth_vps_bot_enabled | bool
  tags: [bot]

- name: Install Caddy + subscription endpoint (opt-in)
  ansible.builtin.include_tasks: subscription.yml
  when: stealth_vps_subscription_enabled | bool
  tags: [subscription, caddy]

- name: Install /usr/local/bin/s-vps operator CLI wrapper
  ansible.builtin.include_tasks: cli_wrapper.yml
  when: stealth_vps_cli_install | bool
  tags: [cli, s-vps]
