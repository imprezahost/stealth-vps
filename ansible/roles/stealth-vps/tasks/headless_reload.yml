---
# Headless-mode service reload.
#
# Runs at the tail of main.yml, AFTER users_index.yml has seeded the
# index. Invokes `python3 -m stealth_vps.reloader` so the actual config
# files match the multi-client (Reality) / userpass (Hysteria2) layout
# that the operator CLI + bot also produce when they mutate the index.
#
# In v0.7 headless mode (`panel_enabled=false`) every converge has TWO
# config writes per protocol:
#   1. xray.yml / hysteria.yml render single-client configs from the
#      *.state.yml files. This is the only state we have BEFORE
#      users_index.yml runs (no index file exists on first install).
#   2. headless_reload.yml — this file — re-renders from
#      users.index.json and SIGHUPs the services. Idempotent: on a
#      single-user install the two renders are byte-identical (both
#      go through json.dumps + sort_keys) so the second pass is a
#      no-op write + no-op SIGHUP.
#
# Skipped in panel mode at the main.yml `when:` gate: the panel API
# drives Xray's inbound state, so overwriting /etc/xray/config.json
# out from under it would crash 3X-UI on its next reconciliation pass.
# ThreeXUIBackend handles mutations through the panel API instead.

# Persist the reloader's effective kwargs as JSON so `s-vps user add /
# revoke / reload` can reconstruct the same Reloader without
# re-discovering all of the role's knobs at run time. The CLI loads
# /etc/stealth-vps/reloader-args.json and feeds it to Reloader(**args).
# Mode 0640 (group=root) — file contains no secrets directly, but
# referencing the state files is enough for an attacker to enumerate
# the deploy. Keep it out of `cat /etc/stealth-vps/*` casual reads.
- name: Persist reloader kwargs for the s-vps CLI
  ansible.builtin.copy:
    content: "{{ {
      'users_index_path': stealth_vps_users_index_path,
      'reality_enabled': stealth_vps_reality_enabled | bool,
      'reality_state_path': stealth_vps_panel_state_dir + '/reality.state.yml',
      'xray_config_path': stealth_vps_xray_config_dir + '/config.json',
      'xray_service': 'xray.service',
      'xray_group': stealth_vps_xray_user,
      'reality_dest': stealth_vps_reality_dest,
      'reality_servernames': stealth_vps_reality_servernames,
      'reality_flow': stealth_vps_reality_flow,
      'hysteria_enabled': stealth_vps_hysteria_enabled | bool,
      'hysteria_state_path': stealth_vps_panel_state_dir + '/hysteria.state.yml',
      'hysteria_config_path': stealth_vps_hysteria_config_dir + '/config.yaml',
      'hysteria_service': 'hysteria-server.service',
      'hysteria_group': stealth_vps_hysteria_user,
      'hysteria_per_user': stealth_vps_hysteria_per_user_enabled | bool,
      'hysteria_tls_cert': (stealth_vps_hysteria_effective_cert | default('') | trim),
      'hysteria_tls_key': (stealth_vps_hysteria_effective_key | default('') | trim),
      'hysteria_masquerade_url': stealth_vps_hysteria_masquerade_url,
      'hysteria_bandwidth_up': stealth_vps_hysteria_bandwidth_up,
      'hysteria_bandwidth_down': stealth_vps_hysteria_bandwidth_down,
      'hysteria_metrics_enabled': stealth_vps_metrics_enabled | bool,
    } | to_nice_json(sort_keys=true, indent=2) }}"
    dest: /etc/stealth-vps/reloader-args.json
    owner: root
    group: root
    mode: '0640'
  tags: [users, index, headless]

- name: Compose reloader argv (base flags)
  # Building argv as a Jinja list (rather than a long `cmd:` string)
  # so empty-string args — `--hysteria-tls-cert ""` in default-scenario
  # mode where hysteria.yml didn't run and `effective_cert` is unset —
  # survive Ansible's whitespace-split of `cmd:`. argparse then sees
  # the explicit empty value instead of "expected one argument".
  ansible.builtin.set_fact:
    stealth_vps_reloader_argv:
      - python3
      - -m
      - stealth_vps.reloader
      - --users-index-path
      - "{{ stealth_vps_users_index_path }}"
      - --reality-enabled
      - "{{ stealth_vps_reality_enabled | string | lower }}"
      - --reality-state-path
      - "{{ stealth_vps_panel_state_dir }}/reality.state.yml"
      - --xray-config-path
      - "{{ stealth_vps_xray_config_dir }}/config.json"
      - --xray-service
      - xray.service
      - --xray-group
      - "{{ stealth_vps_xray_user }}"
      - --reality-dest
      - "{{ stealth_vps_reality_dest }}"
      - --reality-servernames
      - "{{ stealth_vps_reality_servernames | join(',') }}"
      - --reality-flow
      - "{{ stealth_vps_reality_flow }}"
      - --hysteria-enabled
      - "{{ stealth_vps_hysteria_enabled | string | lower }}"
      - --hysteria-state-path
      - "{{ stealth_vps_panel_state_dir }}/hysteria.state.yml"
      - --hysteria-config-path
      - "{{ stealth_vps_hysteria_config_dir }}/config.yaml"
      - --hysteria-service
      - hysteria-server.service
      - --hysteria-group
      - "{{ stealth_vps_hysteria_user }}"
      - --hysteria-per-user
      - "{{ stealth_vps_hysteria_per_user_enabled | string | lower }}"
      - --hysteria-tls-cert
      - "{{ stealth_vps_hysteria_effective_cert | default('') | trim }}"
      - --hysteria-tls-key
      - "{{ stealth_vps_hysteria_effective_key | default('') | trim }}"
      - --hysteria-masquerade-url
      - "{{ stealth_vps_hysteria_masquerade_url }}"
      - --hysteria-bandwidth-up
      - "{{ stealth_vps_hysteria_bandwidth_up }}"
      - --hysteria-bandwidth-down
      - "{{ stealth_vps_hysteria_bandwidth_down }}"
      - --hysteria-metrics-enabled
      - "{{ stealth_vps_metrics_enabled | string | lower }}"
  tags: [users, index, headless]

- name: Append --dry-run inside docker (molecule)
  # Molecule's systemd-in-docker can't actually start xray.service or
  # hysteria-server (no real network stack for the port-bind / no
  # /proc/sys/* writes that hysteria's QUIC stack needs). `--dry-run`
  # skips `systemctl reload <svc>` but still writes the rendered
  # configs to disk so the verify scenario can spot-check shape.
  ansible.builtin.set_fact:
    stealth_vps_reloader_argv: "{{ stealth_vps_reloader_argv + ['--dry-run'] }}"
  when: ansible_facts.virtualization_type | default('') == 'docker'
  tags: [users, index, headless]

- name: Render multi-client configs + reload services via stealth_vps.reloader
  # Output goes to journald (logging format "reloader: <msg>") so an
  # operator can `journalctl -t python3 -u <whatever>` to inspect what
  # happened on the last run. v0.7 B4 (`s-vps` CLI) will wrap this
  # with a friendlier --tail mode.
  ansible.builtin.command:
    argv: "{{ stealth_vps_reloader_argv }}"
  register: stealth_vps_reloader_run
  changed_when: false  # The command always runs; reloader internally
                       # decides whether the files actually changed.
                       # Keeping changed_when=false avoids a spurious
                       # "changed" report on every idempotent converge.
  tags: [users, index, headless]
