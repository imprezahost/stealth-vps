---
# Reality (VLESS-Reality) — wrapper.
#
# Splits cleanly into two halves so v0.7.0 headless mode can swap the
# panel-specific half for `reality_xray_standalone.yml` without touching
# state generation:
#
#   reality_state.yml       — panel-INDEPENDENT.
#                             X25519 keypair + UUID + shortId + port,
#                             persisted to /etc/stealth-vps/reality.state.yml.
#                             Same file is consumed by panel mode (this
#                             wrapper) and by v0.7.0's standalone Xray.
#
#   reality_push_3xui.yml   — panel-SPECIFIC.
#                             Logs into 3X-UI, lists inbounds, creates
#                             the Reality inbound via REST API, runs the
#                             post-deploy TLS smoke test, refreshes the
#                             credentials file. Skipped when
#                             stealth_vps_panel_enabled = false (v0.7).
#
# The expansion plan §2.3 picks Reality as the stealth-first transport: it
# steals the TLS handshake from a real public site so the GFW sees a normal
# visit to that hostname. A request without a valid shortId is proxied to
# the real dest, which is what gives the active-probe resistance.
#
# In v0.6.x panel mode, Reality lives as an inbound INSIDE 3X-UI so
# traffic accounting, multi-client, expiry, and the share URL UI all
# just work via the panel. The bundled xray under /usr/local/x-ui/
# does the actual protocol work.

- name: Install standalone Xray binary (headless mode — must precede reality_state)
  # reality_state.yml uses {{ stealth_vps_xray_keygen_bin }} to mint X25519
  # + UUID. In headless mode that resolves to /usr/local/bin/xray, which
  # this task installs. In panel mode the binary already exists at
  # {{ panel_dir }}/bin/xray-linux-{{ arch }} from the 3X-UI install, and
  # this branch is skipped entirely.
  ansible.builtin.include_tasks: reality_xray_binary.yml
  when: not (stealth_vps_panel_enabled | bool)
  tags: [xray, reality]

- name: Generate Reality state (panel-independent)
  ansible.builtin.include_tasks: reality_state.yml
  tags: [xray, reality]

- name: Push Reality inbound to 3X-UI panel
  ansible.builtin.include_tasks: reality_push_3xui.yml
  when: stealth_vps_panel_enabled | bool
  tags: [xray, reality]

- name: Configure standalone Xray service (headless mode)
  # Renders /etc/xray/config.json from users.index.json + reality.state.yml,
  # drops the hardened systemd unit, starts the service. Runs ONLY when
  # the panel is disabled — `when:` here mirrors the inverse of the
  # `push_3xui` gate above. Mutex enforced naturally by the pair of
  # mutually-exclusive `when:` clauses; no explicit assert.
  ansible.builtin.include_tasks: reality_xray_standalone.yml
  when: not (stealth_vps_panel_enabled | bool)
  tags: [xray, reality]
