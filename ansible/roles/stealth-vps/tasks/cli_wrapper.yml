---
# Install the operator CLI wrapper (`s-vps`) and its bash helper libs.
#
# Layout on the VPS after this runs:
#   /usr/local/bin/s-vps                              (entry point, 0755)
#   /usr/local/lib/stealth-vps/scripts-lib/           (sourced by s-vps)
#       dns-preflight.sh
#       health-check.sh
#       error-wrap.sh
#   /etc/stealth-vps/version                          (pinned release tag)
#   /etc/stealth-vps/installer.env                    (env overrides, 0600)
#
# These files are copied verbatim from scripts/ in the role's files
# directory. The Ansible role doesn't render them as templates because
# they need to work standalone when invoked by a human operator — fewer
# Jinja variables = fewer footguns.

- name: Ensure /usr/local/lib/stealth-vps/scripts-lib/ exists
  ansible.builtin.file:
    path: /usr/local/lib/stealth-vps/scripts-lib
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [cli, s-vps]

- name: Install bash helper libs (sourced by s-vps + install.sh)
  ansible.builtin.copy:
    src: "scripts-lib/{{ item }}"
    dest: "/usr/local/lib/stealth-vps/scripts-lib/{{ item }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - dns-preflight.sh
    - health-check.sh
    - error-wrap.sh
  tags: [cli, s-vps]

- name: Install /usr/local/bin/s-vps operator CLI wrapper
  ansible.builtin.copy:
    src: s-vps
    dest: /usr/local/bin/s-vps
    owner: root
    group: root
    mode: '0755'
  tags: [cli, s-vps]

- name: Ensure /etc/stealth-vps directory exists (for version pin + installer.env)
  ansible.builtin.file:
    path: /etc/stealth-vps
    state: directory
    owner: root
    group: root
    # 0711 (not 0755) — matches panel.yml + reality_state.yml. The dir
    # holds panel/reality/hysteria.state.yml + tls/* which carry secrets;
    # 0755 here was a v0.6 oversight that fought panel.yml's 0711 on
    # every re-run. Files inside (e.g. /etc/stealth-vps/version) are
    # mode 0644 so non-root readers that know the exact path can still
    # `cat` them — the traverse bit (x for others) on 0711 covers that.
    mode: '0711'
  tags: [cli, s-vps]

- name: Record installed stealth-vps version (for `s-vps update`)
  # `stealth_vps_release_tag` is set by install.sh via `-e ...`; defaults
  # to "local" for direct ansible-playbook runs. `s-vps update` reads
  # this file to decide which tag to re-deploy.
  ansible.builtin.copy:
    content: "{{ stealth_vps_release_tag }}\n"
    dest: /etc/stealth-vps/version
    owner: root
    group: root
    mode: '0644'
  tags: [cli, s-vps]

- name: Render /etc/stealth-vps/installer.env (non-secret config for `s-vps update`)
  # This file gets sourced by `s-vps update` so a re-run picks up the
  # operator's original choices (domain, optional services) without them
  # having to retype `-e` flags. Secrets (bot token, panel admin password)
  # live in their own service-specific env files at 0600; this one is
  # safe at 0644 because it's only feature flags + domain.
  ansible.builtin.copy:
    content: |
      # /etc/stealth-vps/installer.env — auto-generated by cli_wrapper.yml.
      # Sourced by `s-vps update` to re-apply the operator's original
      # install choices. Edit cautiously; values are passed verbatim to
      # ansible-pull via `-e`.
      STEALTH_DOMAIN={{ stealth_vps_domain | default('') | quote }}
      STEALTH_PANEL_ENABLED={{ stealth_vps_panel_enabled | bool | ternary('true', 'false') }}
      STEALTH_HYSTERIA_ENABLED={{ stealth_vps_hysteria_enabled | bool | ternary('true', 'false') }}
      STEALTH_BOT_ENABLED={{ stealth_vps_bot_enabled | bool | ternary('true', 'false') }}
      STEALTH_SUBSCRIPTION_ENABLED={{ stealth_vps_subscription_enabled | bool | ternary('true', 'false') }}
      STEALTH_SUBSCRIPTION_EXPOSE={{ stealth_vps_subscription_expose | bool | ternary('true', 'false') }}
    dest: /etc/stealth-vps/installer.env
    owner: root
    group: root
    mode: '0644'
  tags: [cli, s-vps]
