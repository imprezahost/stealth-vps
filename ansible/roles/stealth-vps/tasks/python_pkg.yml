---
# Install the shared stealth-vps Python package at
# /usr/local/lib/stealth-vps/. Imported by the metrics updater, the
# Telegram bot, and (in v0.7+) the s-vps CLI.
#
# Pure stdlib package — no pip install, no venv. We just copy the
# source files into place + drop a .pth file so `import stealth_vps`
# works from any Python invocation that respects /usr/local/lib.

- name: Ensure Python package directory exists
  ansible.builtin.file:
    path: "{{ stealth_vps_python_pkg_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [python_pkg, bot, cli]

- name: Sync Python package source files
  # `copy` with recursive directory source so adding a module later
  # just needs a new file in files/python-pkg/.
  ansible.builtin.copy:
    src: python-pkg/
    dest: "{{ stealth_vps_python_pkg_dir }}/"
    owner: root
    group: root
    mode: '0644'
    directory_mode: '0755'
  tags: [python_pkg, bot, cli]

- name: Drop .pth file so `import stealth_vps` works system-wide
  # Python's site.py reads .pth files from site-packages dirs and
  # appends their content to sys.path. Putting the package's parent
  # dir on sys.path lets `import stealth_vps` succeed from any
  # python3 invocation without requiring PYTHONPATH gymnastics.
  ansible.builtin.copy:
    content: "/usr/local/lib\n"
    dest: /usr/lib/python3/dist-packages/stealth-vps.pth
    owner: root
    group: root
    mode: '0644'
  tags: [python_pkg, bot, cli]

- name: Smoke-test that the package imports cleanly
  ansible.builtin.command:
    cmd: python3 -c "import stealth_vps; print(stealth_vps.__name__)"
  register: stealth_vps_pkg_smoke
  changed_when: false
  failed_when: stealth_vps_pkg_smoke.rc != 0
  tags: [python_pkg, bot, cli]
