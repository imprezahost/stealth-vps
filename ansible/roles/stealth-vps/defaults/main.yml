---
# Defaults for the stealth-vps role.
# Override in inventory or playbook vars.

# ---- Reality (Xray-core) ----
stealth_vps_reality_enabled: true
# Real-internet site whose TLS handshake Reality "steals". Must be
# reachable from the censored network, support TLS 1.3 + X25519 + HTTP/2,
# and not be Cloudflare-fronted. Candidates validated as of Q2/2026:
# www.microsoft.com:443, www.apple.com:443, www.lovelive-anime.jp:443.
stealth_vps_reality_dest: "www.microsoft.com:443"
stealth_vps_reality_servernames:
  - www.microsoft.com
# Port range used to randomly pick the Reality inbound port. Disjoint
# from the panel range; never 443 (port 443 is reserved for the dest).
stealth_vps_reality_port_min: 40000
stealth_vps_reality_port_max: 60000
# Identifier used to find the inbound on subsequent runs. Don't change
# without also wiping the inbound from the panel.
stealth_vps_reality_remark: stealth-vps-reality
# Reality requires XTLS Vision flow. Don't change unless you know why.
stealth_vps_reality_flow: xtls-rprx-vision
# A default client is created so the operator can connect immediately
# after `ansible-playbook --tags xray`. Add more clients via the panel.
stealth_vps_reality_default_client_email: stealth-vps-default
# uTLS fingerprint announced during the inner TLS handshake. chrome is
# the safest default (most blends in); see Xray docs for options.
stealth_vps_reality_fingerprint: chrome

# ---- Hysteria2 ----
stealth_vps_hysteria_enabled: true
# Real-internet site that probes get proxied to. Same logic as Reality's
# `dest` — masquerade as a believable destination.
stealth_vps_hysteria_masquerade_url: "https://news.ycombinator.com/"
# Brutal congestion-control bandwidth hints. Match your link to get
# realistic throughput; over-declaring causes queueing.
stealth_vps_hysteria_bandwidth_up: "200 mbps"
stealth_vps_hysteria_bandwidth_down: "1 gbps"
# UDP port range — disjoint from the panel range (no protocol collision
# with Reality since that one is TCP, but keep ranges segmented for
# easier firewall rules later).
stealth_vps_hysteria_port_min: 40000
stealth_vps_hysteria_port_max: 60000
# Port hopping makes detection harder by spreading the same connection
# across many ports. The role installs an iptables/UFW PREROUTING DNAT
# rule that redirects UDP traffic in the configured range to the actual
# Hysteria2 listening port; the client URI is rendered with the range
# appended so clients can pick a random port per connection.
stealth_vps_hysteria_port_hopping: false
stealth_vps_hysteria_port_hopping_min: 20000
stealth_vps_hysteria_port_hopping_max: 50000
# apernet/hysteria release pin. Last stable in maybe/2026; bumped together
# with a security review.
stealth_vps_hysteria_version: "app/v2.8.2"
stealth_vps_hysteria_bin: /usr/local/bin/hysteria
stealth_vps_hysteria_config_dir: /etc/hysteria
stealth_vps_hysteria_user: hysteria
# Self-signed TLS cert CN. Masquerade clients see a cert pretending to
# be this host; pick a plausible name from the real internet.
stealth_vps_hysteria_cert_cn: bing.com
# Friendly remark used in the credentials file and in any future panel
# integration. Don't reuse the Reality remark.
stealth_vps_hysteria_remark: stealth-vps-hysteria2

# ---- 3X-UI panel ----
stealth_vps_panel_enabled: true
# Pinned to the last 2.x stable; bump after the 3.x line settles. Used in
# the upstream tarball URL — must match a release tag at
# https://github.com/MHSanaei/3x-ui/releases.
stealth_vps_panel_version: "v2.9.4"
# Install layout. Override only if you really need to.
stealth_vps_panel_dir: /usr/local/x-ui
stealth_vps_panel_state_dir: /etc/stealth-vps
# Port range for the panel — kept disjoint from the Reality / Hysteria2
# ranges so the random pick can never collide. Override the single fields
# below to pin instead.
stealth_vps_panel_port_min: 30000
stealth_vps_panel_port_max: 39999
# Where to record generated panel credentials and (later) connection URIs
# for the operator. chmod 600.
stealth_vps_credentials_file: /root/stealth-vps-credentials.txt

# ---- TLS / ACME (Let's Encrypt) ----
# When set to a DNS name whose A/AAAA record points at this host, the
# role will issue a Let's Encrypt cert via acme.sh (HTTP-01 standalone)
# and configure Hysteria2 + 3X-UI panel to use it. Leave null/false to
# keep the v0.1.0 behaviour (self-signed Hysteria2 cert + HTTP panel).
stealth_vps_domain: null
# Email registered with the CA. Required for issuance — Let's Encrypt
# uses it for expiry notifications and key recovery.
stealth_vps_tls_email: ""
# Where the role symlinks the live cert. Hysteria2 + 3X-UI both read
# from these paths when stealth_vps_domain is set.
stealth_vps_tls_dir: /etc/stealth-vps/tls
# Standalone port acme.sh listens on for the HTTP-01 challenge. Must be
# reachable from the public internet (UFW opens it when
# stealth_hardening_ufw_acme_http_challenge is true).
stealth_vps_acme_http_port: 80

# ---- Kernel tuning ----
# Enable BBR congestion control + fq qdisc. Disable only when the kernel
# does not support BBR (rare on Debian 12+ / Ubuntu 22.04+; impossible on
# OpenVZ/LXC containers that share the host kernel).
stealth_vps_kernel_bbr: true
# Enable TCP Fast Open (value 3 = client + server). Set false to disable.
stealth_vps_kernel_fastopen: true
# Advanced — TCP socket buffer ceilings (bytes) and per-connection ranges.
# Defaults match docs/internal/expansion-plan.md §2.2; most users should
# leave these alone.
stealth_vps_kernel_rmem_max: 67108864
stealth_vps_kernel_wmem_max: 67108864
stealth_vps_kernel_tcp_rmem: "4096 87380 67108864"
stealth_vps_kernel_tcp_wmem: "4096 65536 67108864"
stealth_vps_kernel_mtu_probing: 1
stealth_vps_kernel_notsent_lowat: 16384
stealth_vps_kernel_file_max: 1048576

# ---- IPv6 ----
stealth_vps_ipv6_enabled: true

# ---- Observability (node_exporter) ----
# Installs Prometheus node_exporter bound to 127.0.0.1:9100 (NOT
# exposed externally — operator pulls metrics via SSH tunnel from
# a central Prometheus, or flips stealth_vps_observability_listen
# to "0.0.0.0:9100" and adds a UFW rule with explicit source).
# Set to false on environments where you don't want the binary running.
stealth_vps_observability_enabled: true
stealth_vps_observability_listen: "127.0.0.1:9100"
