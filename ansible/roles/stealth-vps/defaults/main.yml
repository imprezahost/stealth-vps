---
# Defaults for the stealth-vps role.
# Override in inventory or playbook vars.

# ---- Architecture mapping ----
# Maps ansible_facts.architecture (uname -m) to the GOARCH-style suffix
# used by upstream release archives (Xray-core, Hysteria2, 3X-UI). Add a
# mapping here if you want to try an architecture we haven't validated.
#
# Validated by upstream + smoke-tested by stealth-vps maintainers:
#   x86_64 → amd64  (every Debian/Ubuntu VPS by default)
#   aarch64 → arm64 (Oracle Ampere free tier, AWS Graviton, RPi-class
#                    boards running Debian/Ubuntu 64-bit)
stealth_vps_arch_map:
  x86_64: amd64
  aarch64: arm64

# ---- Reality (Xray-core) ----
stealth_vps_reality_enabled: true
# Real-internet site whose TLS handshake Reality "steals". Must be
# reachable from the censored network, support TLS 1.3 + X25519 + HTTP/2,
# and not be Cloudflare-fronted. Candidates validated as of Q2/2026:
# www.microsoft.com:443, www.apple.com:443, www.lovelive-anime.jp:443.
stealth_vps_reality_dest: "www.microsoft.com:443"
stealth_vps_reality_servernames:
  - www.microsoft.com
# Port range used to randomly pick the Reality inbound port. Disjoint
# from the panel range; never 443 (port 443 is reserved for the dest).
stealth_vps_reality_port_min: 40000
stealth_vps_reality_port_max: 60000
# Identifier used to find the inbound on subsequent runs. Don't change
# without also wiping the inbound from the panel.
stealth_vps_reality_remark: stealth-vps-reality
# Reality requires XTLS Vision flow. Don't change unless you know why.
stealth_vps_reality_flow: xtls-rprx-vision
# A default client is created so the operator can connect immediately
# after `ansible-playbook --tags xray`. Add more clients via the panel.
stealth_vps_reality_default_client_email: stealth-vps-default
# uTLS fingerprint announced during the inner TLS handshake. chrome is
# the safest default (most blends in); see Xray docs for options.
stealth_vps_reality_fingerprint: chrome

# ---- Hysteria2 ----
stealth_vps_hysteria_enabled: true
# Real-internet site that probes get proxied to. Same logic as Reality's
# `dest` — masquerade as a believable destination.
stealth_vps_hysteria_masquerade_url: "https://news.ycombinator.com/"
# Brutal congestion-control bandwidth hints. Match your link to get
# realistic throughput; over-declaring causes queueing.
stealth_vps_hysteria_bandwidth_up: "200 mbps"
stealth_vps_hysteria_bandwidth_down: "1 gbps"
# UDP port range — disjoint from the panel range (no protocol collision
# with Reality since that one is TCP, but keep ranges segmented for
# easier firewall rules later).
stealth_vps_hysteria_port_min: 40000
stealth_vps_hysteria_port_max: 60000
# Port hopping makes detection harder by spreading the same connection
# across many ports. The role installs an iptables/UFW PREROUTING DNAT
# rule that redirects UDP traffic in the configured range to the actual
# Hysteria2 listening port; the client URI is rendered with the range
# appended so clients can pick a random port per connection.
stealth_vps_hysteria_port_hopping: false
stealth_vps_hysteria_port_hopping_min: 20000
stealth_vps_hysteria_port_hopping_max: 50000
# Hysteria2 traffic stats API (JSON only in 2.8.2; converted to
# Prometheus by stealth-vps-metrics-update.sh). Loopback only.
stealth_vps_hysteria_traffic_stats_listen: "127.0.0.1:9101"
# apernet/hysteria release pin. Last stable in maybe/2026; bumped together
# with a security review.
stealth_vps_hysteria_version: "app/v2.8.2"
stealth_vps_hysteria_bin: /usr/local/bin/hysteria
stealth_vps_hysteria_config_dir: /etc/hysteria
stealth_vps_hysteria_user: hysteria
# Self-signed TLS cert CN. Masquerade clients see a cert pretending to
# be this host; pick a plausible name from the real internet.
stealth_vps_hysteria_cert_cn: bing.com
# Friendly remark used in the credentials file and in any future panel
# integration. Don't reuse the Reality remark.
stealth_vps_hysteria_remark: stealth-vps-hysteria2

# ---- 3X-UI panel ----
stealth_vps_panel_enabled: true
# Pinned to the last 2.x stable; bump after the 3.x line settles. Used in
# the upstream tarball URL — must match a release tag at
# https://github.com/MHSanaei/3x-ui/releases.
stealth_vps_panel_version: "v2.9.4"
# Install layout. Override only if you really need to.
stealth_vps_panel_dir: /usr/local/x-ui
stealth_vps_panel_state_dir: /etc/stealth-vps
# Port range for the panel — kept disjoint from the Reality / Hysteria2
# ranges so the random pick can never collide. Override the single fields
# below to pin instead.
stealth_vps_panel_port_min: 30000
stealth_vps_panel_port_max: 39999
# Where to record generated panel credentials and (later) connection URIs
# for the operator. chmod 600.
stealth_vps_credentials_file: /root/stealth-vps-credentials.txt

# ---- TLS / ACME (Let's Encrypt) ----
# When set to a DNS name whose A/AAAA record points at this host, the
# role will issue a Let's Encrypt cert via acme.sh (HTTP-01 standalone)
# and configure Hysteria2 + 3X-UI panel to use it. Leave null/false to
# keep the v0.1.0 behaviour (self-signed Hysteria2 cert + HTTP panel).
stealth_vps_domain: null
# Email registered with the CA. Required for issuance — Let's Encrypt
# uses it for expiry notifications and key recovery.
stealth_vps_tls_email: ""
# Where the role symlinks the live cert. Hysteria2 + 3X-UI both read
# from these paths when stealth_vps_domain is set.
stealth_vps_tls_dir: /etc/stealth-vps/tls
# Standalone port acme.sh listens on for the HTTP-01 challenge. Must be
# reachable from the public internet (UFW opens it when
# stealth_hardening_ufw_acme_http_challenge is true).
stealth_vps_acme_http_port: 80

# ---- Kernel tuning ----
# Enable BBR congestion control + fq qdisc. Disable only when the kernel
# does not support BBR (rare on Debian 12+ / Ubuntu 22.04+; impossible on
# OpenVZ/LXC containers that share the host kernel).
stealth_vps_kernel_bbr: true
# Enable TCP Fast Open (value 3 = client + server). Set false to disable.
stealth_vps_kernel_fastopen: true
# Advanced — TCP socket buffer ceilings (bytes) and per-connection ranges.
# Defaults match docs/internal/expansion-plan.md §2.2; most users should
# leave these alone.
stealth_vps_kernel_rmem_max: 67108864
stealth_vps_kernel_wmem_max: 67108864
stealth_vps_kernel_tcp_rmem: "4096 87380 67108864"
stealth_vps_kernel_tcp_wmem: "4096 65536 67108864"
stealth_vps_kernel_mtu_probing: 1
stealth_vps_kernel_notsent_lowat: 16384
stealth_vps_kernel_file_max: 1048576

# ---- IPv6 ----
stealth_vps_ipv6_enabled: true

# ---- Observability (node_exporter) ----
# Installs Prometheus node_exporter bound to 127.0.0.1:9100 (NOT
# exposed externally — operator pulls metrics via SSH tunnel from
# a central Prometheus, or flips stealth_vps_observability_listen
# to "0.0.0.0:9100" and adds a UFW rule with explicit source).
# Set to false on environments where you don't want the binary running.
stealth_vps_observability_enabled: true
stealth_vps_observability_listen: "127.0.0.1:9100"
# Stealth-vps-specific metrics (Reality inbound traffic via 3X-UI API
# + Hysteria2 trafficStats) get written as a Prometheus .prom file
# into the textfile_collector dir below; node_exporter exposes them
# on the same /metrics endpoint, so Prometheus has one scrape target.
stealth_vps_metrics_enabled: true
stealth_vps_metrics_textfile_dir: /var/lib/stealth-vps/metrics
stealth_vps_metrics_refresh_interval_sec: 30
# Exposure for node_exporter: if you set `stealth_vps_observability_listen`
# to a non-loopback address, list the scraper's CIDR(s) here. UFW will
# allow only those sources to reach the port. Empty list = no UFW rule;
# either keep listen on 127.0.0.1 + tunnel, or open via
# stealth_hardening_ufw_extra_ports yourself.
stealth_vps_observability_allow_from: []

# ---- v0.6.0: Users index + operator tooling ----
# users.index.json is the operator's source-of-truth for "who is
# authorised to connect": one record per Reality client with their
# UUID, Hysteria2 password, subscription token, and metadata. The
# index is populated in panel mode by the bot/CLI doing a double-
# write (panel API + this file); in v0.7.0 headless mode the index
# becomes authoritative and the panel disappears. Either way the
# operator surface (bot commands, sub URLs) stays identical, which
# is what makes the migration from panel to headless a flag flip.
stealth_vps_users_index_path: /etc/stealth-vps/users.index.json

# (stealth_vps_panel_enabled already declared above in the panel section.
# v0.7.0 will let operators set it to false to run standalone Xray;
# v0.5.9's xray.yml split into reality_state.yml + reality_push_3xui.yml
# makes that flag flip a 1-line change in xray.yml.)

# ---- v0.6.0: Telegram bot (opt-in) ----
# When enabled the role installs `stealth-vps-bot.service` running
# the Python bot under /opt/stealth-vps/venv. The bot answers
# operator commands (`/status`, `/diagnose`, `/creds`, `/user add|list|revoke`,
# `/sub`, `/sub revoke`) and DMs the operator after first install
# with the default URI + QR + sub URL.
#
# To get a BotFather token: open https://t.me/BotFather → /newbot.
# To capture the admin chat_id automatically: leave admin_chat_ids
# empty; the bot enters pairing mode on first boot and accepts the
# first /start it receives as the admin.
stealth_vps_bot_enabled: false
stealth_vps_bot_token: ""
stealth_vps_bot_admin_chat_ids: []

# ---- v0.6.0: Subscription endpoint (opt-in) ----
# When enabled the role installs Caddy + a vhost that serves
# /var/lib/stealth-vps/subscriptions/<token>.txt at
# /.well-known/stealth-vps-sub/<token>. Default bind is 127.0.0.1:8443
# (operator accesses via SSH tunnel). Set _expose=true to bind 0.0.0.0:443
# + open UFW — needed only when users will fetch their sub from outside
# your network.
stealth_vps_subscription_enabled: false
stealth_vps_subscription_expose: false
stealth_vps_subscription_path: /.well-known/stealth-vps-sub

# ---- v0.6.0: Operator CLI ----
# Drops a shell wrapper at /usr/local/bin/s-vps exposing `update`
# (fetch latest tag + ansible-pull with smart --tags) and `diagnose`
# (the health-check checklist). Full Python CLI with verb expansion
# lands in v0.7.0.
stealth_vps_cli_install: true
# Release tag recorded into /etc/stealth-vps/version (so `s-vps update`
# without arguments re-deploys the same tag). install.sh passes the
# tag it checked out via `-e stealth_vps_release_tag=...`. When the
# playbook runs directly (no install.sh), this stays "local" which is
# the signal `s-vps update` needs to refuse with "pass an explicit tag".
stealth_vps_release_tag: "local"

# ---- v0.6.0: Python package for bot/CLI/metrics ----
# Shared modules live under /usr/local/lib/stealth-vps/ — threex_client,
# state, backends, subscription, urivider. metrics-update.py and the
# bot both import from this path. v0.7.0 adds backends_headless.py.
stealth_vps_python_pkg_dir: /usr/local/lib/stealth_vps

# ---- v0.7.0: Standalone Xray (when stealth_vps_panel_enabled=false) ----
# In v0.7 headless mode the Reality inbound runs as its own Xray-core
# systemd service instead of being embedded in the 3X-UI binary. The
# task `reality_xray_standalone.yml` (lands in v0.7 Block 2) downloads
# the upstream binary, drops a hardened systemd unit, and renders
# /etc/xray/config.json from users.index.json + reality.state.yml.
#
# Mutually exclusive with stealth_vps_panel_enabled — main.yml asserts
# never-both (see v0.7 Block 2). Operators flip from panel to headless
# by setting stealth_vps_panel_enabled=false and re-running the role;
# the panel.state.yml on disk stays as a rollback path until the
# operator explicitly removes the panel.
stealth_vps_xray_version: "v25.5.16"
stealth_vps_xray_bin: /usr/local/bin/xray
stealth_vps_xray_user: xray
stealth_vps_xray_config_dir: /etc/xray
stealth_vps_xray_state_dir: /var/lib/xray

# Which xray binary `reality_state.yml` uses to mint the X25519 keypair +
# the default client's UUID on first run. In panel mode the binary lives
# at `{{ panel_dir }}/bin/xray-linux-{{ arch }}` (bundled with 3X-UI);
# in headless mode `reality_xray_binary.yml` installs it at
# `{{ stealth_vps_xray_bin }}` BEFORE `reality_state.yml` runs.
# Computed so the same `reality_state.yml` works in both modes without
# branching.
stealth_vps_xray_keygen_bin: >-
  {{ stealth_vps_xray_bin
     if not (stealth_vps_panel_enabled | bool)
     else (stealth_vps_panel_dir + '/bin/xray-linux-' + stealth_vps_arch) }}

# ---- v0.7.0: Hysteria2 per-user authentication ----
# v0.6 mode: 3X-UI limitation forces a single shared Hysteria2 password
# for every Reality client. v0.7 mode: each entry in users.index.json
# carries its own hysteria_password, and hysteria-config.yaml.j2 renders
# the `auth.type: userpass` block from the index. Enabled automatically
# when the index has >1 user OR when the panel is disabled.
#
# Operators with a v0.6 install upgrading to v0.7 hit
# tasks/hysteria_migrate_state.yml (v0.7 Block 2), which converts the
# old single-password hysteria.state.yml to the per-user dict shape
# preserving the existing password as the default client's value.
# Default: per-user mode tracks panel mode. Panel ON → shared password
# (3X-UI's data model uses one inbound, one auth, all clients ride the
# same Hysteria2 listener). Panel OFF → headless mode, every client gets
# its own auth token in users.index.json so revoking one user doesn't
# break the others. Operators can override either way: panel-mode
# headless backends + per-user is supported by the reloader, panel-mode
# with per-user is a panel-API limitation we don't fight.
stealth_vps_hysteria_per_user_enabled: "{{ not (stealth_vps_panel_enabled | bool) }}"
