---
# SSH hardening — adds a drop-in to /etc/ssh/sshd_config.d/ that:
#   * adds a stealth port (additive — port 22 stays until the legacy
#     toggle is flipped in a follow-up sub-sprint)
#   * forces key-only auth (no password)
#   * tightens auth limits + idle handling
#   * pins modern KEX / ciphers / MACs / host-key algorithms
#   * restricts which unix accounts may log in at all
#
# `validate: sshd -t -f %s` runs against the rendered drop-in BEFORE it
# is moved into place, so a typo cannot accidentally take sshd offline.
# We then run a full `sshd -t` against the merged config to catch
# conflicts with the main /etc/ssh/sshd_config.

- name: Ensure /etc/ssh/sshd_config.d exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [ssh, hardening]

- name: Render stealth-vps sshd drop-in
  ansible.builtin.template:
    src: 99-stealth-vps.conf.j2
    dest: /etc/ssh/sshd_config.d/99-stealth-vps.conf
    owner: root
    group: root
    mode: '0644'
    backup: true
    # sshd -t -f %s parses just this file. Catches obvious typos before
    # we move it into place. The next task does a full-config validation.
    validate: sshd -t -f %s
  register: stealth_hardening_ssh_dropin
  tags: [ssh, hardening]

# `Port 22` lives in the main sshd_config, not in the drop-in (Port is
# additive, so a drop-in cannot remove a port the main file declared).
# To complete the dual-port transition, comment the line out in-place.

- name: Keep 'Port 22' enabled in main sshd_config (transitional)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*Port 22(\s.*)?$'
    line: 'Port 22'
    validate: sshd -t -f %s
    backup: true
  when: stealth_hardening_ssh_legacy_port_enabled | bool
  register: stealth_hardening_ssh_legacy_on
  tags: [ssh, hardening]

- name: Disable 'Port 22' in main sshd_config (transition over)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*Port 22(\s.*)?$'
    line: '# Port 22  # disabled by stealth-vps hardening'
    validate: sshd -t -f %s
    backup: true
  when: not (stealth_hardening_ssh_legacy_port_enabled | bool)
  register: stealth_hardening_ssh_legacy_off
  tags: [ssh, hardening]

- name: Validate the merged sshd config (drop-in + main)
  ansible.builtin.command:
    cmd: sshd -t
  changed_when: false
  tags: [ssh, hardening]

- name: Restart sshd to pick up the new drop-in / legacy-port change
  # Explicit task instead of a handler — `meta: flush_handlers` inside an
  # include_tasks didn't fire reliably on ansible-core 2.14 in our test.
  # An explicit restart-on-changed is deterministic and shows up in the
  # play recap, which makes debugging the listener trivial.
  ansible.builtin.systemd:
    name: ssh
    state: restarted
  when: >-
    stealth_hardening_ssh_dropin.changed
    or (stealth_hardening_ssh_legacy_on.changed | default(false))
    or (stealth_hardening_ssh_legacy_off.changed | default(false))
  tags: [ssh, hardening]

- name: Wait for the hardened SSH port to listen
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ stealth_hardening_ssh_port }}"
    timeout: 15
  # Skip inside Docker containers — sshd may be installed but it's not
  # started as a systemd service in the test image (geerlingguy/docker-
  # *-ansible runs only what's needed for the molecule lifecycle). On a
  # real VPS the systemd-reload-or-restart of ssh.socket / ssh.service
  # above brings the port up, and the wait_for verifies it.
  when: ansible_facts.virtualization_type | default('') != 'docker'
  tags: [ssh, hardening]

- name: Probe listening SSH sockets (status report)
  ansible.builtin.command:
    cmd: ss -ltnH
  register: stealth_hardening_ssh_listeners
  changed_when: false
  tags: [ssh, hardening]

- name: Show SSH listener summary
  ansible.builtin.debug:
    msg: >-
      SSH listeners after hardening:
      {{ stealth_hardening_ssh_listeners.stdout_lines
         | select('search', ':(22|' + (stealth_hardening_ssh_port | string) + ')\\s')
         | list }}
  tags: [ssh, hardening]
