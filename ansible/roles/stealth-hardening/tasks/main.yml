---
# stealth-hardening role — main task entry.
#
# All hardening sub-tasks are pending implementation. Uncomment each include
# as the file is added in the matching sprint task.

- name: Assert supported distribution
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] in ['Debian', 'Ubuntu']
    fail_msg: "stealth-hardening currently supports Debian 12+ and Ubuntu 22.04+ only."

- name: Harden SSH (port, key-only, sane defaults)
  ansible.builtin.include_tasks: ssh.yml
  tags: [ssh, hardening]

- name: Configure UFW firewall
  ansible.builtin.include_tasks: ufw.yml
  when: stealth_hardening_ufw_enabled | bool
  tags: [ufw, firewall, hardening]

- name: Configure fail2ban (including working 3X-UI jail)
  ansible.builtin.include_tasks: fail2ban.yml
  when: stealth_hardening_fail2ban_enabled | bool
  tags: [fail2ban, hardening]

- name: Configure unattended-upgrades for security patches
  ansible.builtin.include_tasks: unattended-upgrades.yml
  when: stealth_hardening_unattended_upgrades | bool
  tags: [updates, patches, hardening]

