---
# GitLab CI pipeline for stealth-vps.
#
# Lint and test on every push.
# Mirror to public GitHub only on annotated tags (releases).

stages:
  - lint
  - test
  - probe
  - mirror
  - report

# All jobs run on the project-scoped runner registered at v0.6.0 (tokyo-test-th,
# Docker executor). The default `tags:` applies to every job unless overridden.
# Without this, jobs would be picked up by the instance-shared `whmcs-deploy`
# runner whose shell executor lacks Python + apt perms — see the v0.6.0 release
# notes' "Known issues" section.
default:
  tags:
    - stealth-vps-ci

# Skip the "empty" push-pipeline that fires when the GitHub reverse-mirror
# workflow pushes a PR to ext/pr-<N> before opening the MR — the MR pipeline
# (detached) is what we actually want to run.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^ext\/pr-[0-9]+$/
      when: never
    - when: always

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - .venv/

# ---------------------------------------------------------------------------
# LINT
# ---------------------------------------------------------------------------

.lint-base: &lint-base
  stage: lint
  image: python:3.12-slim
  before_script:
    - apt-get update -qq && apt-get install -yqq --no-install-recommends git
    - python -m pip install --upgrade pip
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

shellcheck:
  <<: *lint-base
  script:
    - apt-get install -yqq --no-install-recommends shellcheck
    - find scripts -type f -name "*.sh" -print0 | xargs -0 -r shellcheck

yamllint:
  <<: *lint-base
  script:
    - pip install yamllint
    - yamllint -s .

ansible-lint:
  <<: *lint-base
  script:
    - pip install "ansible-core>=2.14,<2.18" ansible-lint
    - ansible-galaxy collection install -r ansible/requirements.yml
    # ANSIBLE_CONFIG forces ansible-lint's internal syntax-check call to
    # honour the repo's ansible.cfg (roles_path = ansible/roles). Without
    # it the syntax-check sub-step searches relative to the playbook's
    # directory and reports `stealth-hardening` as missing.
    - export ANSIBLE_CONFIG=$CI_PROJECT_DIR/ansible.cfg
    - export ANSIBLE_ROLES_PATH=$CI_PROJECT_DIR/ansible/roles
    - ansible-lint

markdown-lint:
  <<: *lint-base
  image: node:20-alpine
  before_script:
    - apk add --no-cache git
    - npm install -g markdownlint-cli2
  script:
    - markdownlint-cli2 "**/*.md" "#node_modules"
  # Re-enabled as gating after the cleanup MR. Config in
  # .markdownlint.json disables the noisy cosmetic rules
  # (MD013/MD022/MD024/MD031/MD032/MD060) but keeps MD040/MD029/MD034
  # as real-readability checks.

# ---------------------------------------------------------------------------
# TEST — pytest for the stealth_vps Python pkg + Molecule on Debian + systemd
# ---------------------------------------------------------------------------

pytest:
  stage: test
  image: python:3.12-slim
  before_script:
    - apt-get update -qq && apt-get install -yqq --no-install-recommends git
    - python -m pip install --upgrade pip pytest
  script:
    # pyproject.toml's pythonpath points at ansible/roles/stealth-vps/files/
    # so `import stealth_vps` resolves to the source tree directly — no
    # install step needed. The pkg is pure stdlib.
    - pytest tests/python-pkg/ -v
    # Also test the standalone cloud-init builder Python port. Lives
    # in its own pyproject so the test runs against the packaged code
    # path (vs the pure-stdlib in-tree path that pytest --rootdir picks).
    - PYTHONPATH=tools/cloud-init-builder/python pytest tools/cloud-init-builder/python/tests/ -v
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

go-test:
  # Go port of the cloud-init builder — byte-parity tests against the
  # TS source live in the same package. Cheap job (~30s), runs in
  # parallel with pytest.
  stage: test
  image: golang:1.22-alpine
  script:
    - cd tools/cloud-init-builder/go
    - go test -v ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

molecule:
  stage: test
  # python:3.12-slim (Debian-based) instead of docker:24 (Alpine).
  # Alpine's musl libc + pip ship a known pyexpat ABI mismatch
  # (`XML_SetAllocTrackerActivationThreshold: symbol not found`) that
  # makes any `pip install` crash. Debian's glibc pip is rock-solid.
  # We pull the Docker CLI from apt-get and talk to the DinD service.
  image: python:3.12-slim
  services:
    - name: docker:24-dind
      command: ["--tls=false"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  before_script:
    # Install the Docker CLI from Docker's own apt repo. `docker.io`
    # from Debian also works but `--no-install-recommends` strips its
    # /usr/bin/docker symlink in some image-vintage combinations; using
    # `docker-ce-cli` is the upstream-supported path.
    - apt-get update -qq
    - apt-get install -yqq --no-install-recommends git ca-certificates curl gnupg
    - install -m 0755 -d /etc/apt/keyrings
    - curl -fsSL https://download.docker.com/linux/debian/gpg
        | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    - chmod a+r /etc/apt/keyrings/docker.gpg
    - echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg]
        https://download.docker.com/linux/debian bookworm stable"
        > /etc/apt/sources.list.d/docker.list
    - apt-get update -qq
    - apt-get install -yqq --no-install-recommends docker-ce-cli
    - which docker && docker --version
    - python -m pip install --quiet --upgrade pip
    - pip install --quiet
        "ansible-core>=2.14,<2.18" "molecule>=24"
        "molecule-plugins[docker]" "docker"
    # molecule-plugins/docker/playbooks/destroy.yml uses
    # `community.docker.docker_container` — install it alongside the
    # project's own collections.
    - ansible-galaxy collection install -r ansible/requirements.yml
    - ansible-galaxy collection install community.docker
    # Molecule shells out to `ansible-playbook --syntax-check site.yml`
    # which needs the repo's roles_path to find `stealth-hardening`.
    # Same fix as the ansible-lint job — point Ansible at our config.
    - export ANSIBLE_CONFIG=$CI_PROJECT_DIR/ansible.cfg
    - export ANSIBLE_ROLES_PATH=$CI_PROJECT_DIR/ansible/roles
  script:
    - export ANSIBLE_CONFIG=$CI_PROJECT_DIR/ansible.cfg
    - export ANSIBLE_ROLES_PATH=$CI_PROJECT_DIR/ansible/roles
    # molecule discovers scenarios via `./molecule/<name>/molecule.yml`
    # relative to CWD — so we cd into `tests/` (parent of `molecule/`),
    # not into the scenario dir itself. Older molecule (v6) accepted
    # being run from inside a scenario; v24+ removed that.
    - cd tests
    # Run both scenarios — default (panel mode) and headless (v0.7
    # panel_enabled=false). `molecule test` per scenario cleans up
    # after itself; running them sequentially in one job keeps total
    # DinD overhead low.
    - molecule test --scenario-name default
    - molecule test --scenario-name headless
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  # Gating since pipeline 828 (the first green molecule run on the
  # python:3.12-slim + docker-ce-cli + DinD stack). Real-VPS
  # validation (docs/development.md path B) still lives — molecule
  # catches container-tolerant regressions, the VPS catches the rest.

# ---------------------------------------------------------------------------
# PROBE — probe-resistance suite against a live staging deploy
# Manual trigger only. Needs PROBE_TARGET + PROBE_REALITY_DEST as CI vars
# (set per pipeline run via the "Run pipeline" UI). See
# tests/probe-resistance/README.md for the full env-var contract.
# ---------------------------------------------------------------------------

probe-resistance:
  stage: probe
  image: debian:12-slim
  before_script:
    - apt-get update -qq
    - apt-get install -yqq --no-install-recommends curl ca-certificates nmap python3 python3-venv
  script:
    - cd tests/probe-resistance
    - python3 -m venv .venv
    - . .venv/bin/activate
    - pip install --quiet -r requirements.txt
    - echo "--- 01-https-direct-probe ---"
    - bash scripts/https_direct_probe.sh
    - echo "--- 02-tls-fingerprint (JA3+JA3S, since v0.5.1) ---"
    - python3 scripts/tls_fingerprint_compare.py
    - echo "--- 03-active-probe HTTP/1 ---"
    - python3 scripts/active_probe.py || [ "$?" -eq 2 ]
    - echo "--- 03h2-h2-settings (since v0.5.2) ---"
    - python3 scripts/h2_settings_compare.py || [ "$?" -eq 2 ]
    - echo "--- 04-port-scan-baseline ---"
    - bash scripts/port_scan_baseline.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" && $PROBE_TARGET
      when: manual
  allow_failure: true

# ---------------------------------------------------------------------------
# MIRROR — push tagged release to public GitHub mirror
# ---------------------------------------------------------------------------

mirror-to-github:
  stage: mirror
  image: alpine:3.20
  before_script:
    - apk add --no-cache git openssh-client
    - mkdir -p ~/.ssh
    - echo "$GITHUB_DEPLOY_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - git clone --bare "$CI_REPOSITORY_URL" repo.git
    - cd repo.git
    - git remote add github git@github.com:imprezahost/stealth-vps.git
    # push only the current tag and main branch — not all history of internal branches
    - git push github "refs/tags/$CI_COMMIT_TAG"
    - git push github "+refs/heads/main:refs/heads/main"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?$/
  variables:
    GIT_STRATEGY: none

# ---------------------------------------------------------------------------
# REPORT — reflect pipeline status back to the upstream GitHub PR
# Only runs on branches created by the reverse-mirror workflow (ext/pr-<N>).
# ---------------------------------------------------------------------------

.report-github-status:
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl jq
  variables:
    # GIT_STRATEGY: none — we only need the env vars, no working tree.
    GIT_STRATEGY: none
    GITHUB_REPO: "imprezahost/stealth-vps"

.post-status: &post-status |
  curl -fsSL -X POST \
    -H "Authorization: Bearer ${GITHUB_API_TOKEN}" \
    -H "Accept: application/vnd.github+json" \
    "https://api.github.com/repos/${GITHUB_REPO}/statuses/${CI_COMMIT_SHA}" \
    -d "$(jq -nc \
          --arg state    "${STATE}" \
          --arg url      "${CI_PIPELINE_URL}" \
          --arg desc     "${DESC}" \
          --arg context  "stealth-vps/gitlab-ci" \
          '{state:$state, target_url:$url, description:$desc, context:$context}')"

report-status-start:
  extends: .report-github-status
  stage: lint
  variables:
    GIT_STRATEGY: none
    GITHUB_REPO: "imprezahost/stealth-vps"
    STATE: pending
    DESC: "Internal pipeline started"
  script:
    - *post-status
  rules:
    - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^ext\/pr-[0-9]+$/

report-status-success:
  extends: .report-github-status
  stage: report
  variables:
    GIT_STRATEGY: none
    GITHUB_REPO: "imprezahost/stealth-vps"
    STATE: success
    DESC: "Internal pipeline passed"
  script:
    - *post-status
  rules:
    - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^ext\/pr-[0-9]+$/
      when: on_success

report-status-failure:
  extends: .report-github-status
  stage: report
  variables:
    GIT_STRATEGY: none
    GITHUB_REPO: "imprezahost/stealth-vps"
    STATE: failure
    DESC: "Internal pipeline failed"
  script:
    - *post-status
  rules:
    - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^ext\/pr-[0-9]+$/
      when: on_failure
