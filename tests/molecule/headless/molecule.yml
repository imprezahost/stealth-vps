---
# Molecule `headless` scenario — converges the role with
# stealth_vps_panel_enabled=false against the same Debian/Ubuntu matrix
# as the `default` scenario. Catches headless-mode regressions in CI
# (xray standalone install, mutex with panel, config.json template
# rendering from the seeded index, hysteria_migrate_state once it lands
# in v0.7 B3).
#
# Scope (in) — same opt-outs as default scenario PLUS:
#   * panel disabled → x-ui not installed, panel.state.yml not created
#   * standalone xray binary downloaded to /usr/local/bin/xray
#   * xray.service unit dropped, but NOT started in molecule (the
#     container's systemd-in-docker can't always bind a random high port
#     without a real network stack — same reason the default scenario
#     skips hysteria/panel run-time bring-up). What we verify is that
#     the config + unit files are correct on disk.
#
# Scope (out) — same as default plus:
#   * actual Reality handshake testing → that's path B / VPS validation.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../ansible/requirements.yml

driver:
  name: docker

platforms:
  - name: stealth-vps-headless-debian12
    image: geerlingguy/docker-debian12-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /run/lock
  - name: stealth-vps-headless-ubuntu2204
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /run/lock
  - name: stealth-vps-headless-ubuntu2404
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /run/lock

provisioner:
  name: ansible
  playbooks:
    prepare: ../default/prepare.yml
    converge: ../../../ansible/playbooks/site.yml
    verify: verify.yml
  inventory:
    group_vars:
      all:
        # Headline difference from the `default` scenario: panel OFF.
        stealth_vps_panel_enabled: false

        # Same container-friendly opt-outs as `default` (these aren't
        # specific to headless mode — they're the molecule-vs-real-host
        # gap).
        stealth_vps_reality_enabled: true     # we DO want xray standalone
        stealth_vps_hysteria_enabled: false   # B3 will turn this on
        stealth_vps_observability_enabled: false
        stealth_vps_metrics_enabled: false
        stealth_vps_domain: null

        stealth_hardening_ufw_enabled: false
        stealth_hardening_fail2ban_enabled: false
        stealth_hardening_unattended_upgrades: false
        stealth_hardening_spamhaus_enabled: false

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
