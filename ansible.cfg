; ansible.cfg for stealth-vps.
;
; Picked up automatically when ansible-playbook / ansible-lint run from
; the repository root. Keeps the role-lookup path stable across the
; three usage modes (install.sh, ansible-pull, direct playbook).

[defaults]
roles_path = ansible/roles
collections_path = ansible/collections:~/.ansible/collections
inventory = ansible/inventory/example.yml
host_key_checking = False
retry_files_enabled = False
deprecation_warnings = True
stdout_callback = default
forks = 10

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
